name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build React frontend ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Deploy frontend dist to EC2 ───────────────────────────────────────
      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          source: "frontend/dist/"
          target: "/home/ubuntu/options_dashboard/frontend/"
          strip_components: 1

      # ── Sync backend & restart API ────────────────────────────────────────
      - name: Pull latest code & restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          script: |
            set -e
            cd /home/ubuntu/options_dashboard

            # Pull latest backend code
            git fetch origin main
            git reset --hard origin/main

            # Install any new Python dependencies
            .venv/bin/pip install -r requirements.txt -q

            # Restart FastAPI backend
            sudo systemctl restart options-dashboard-api

            echo "Deploy complete at $(date)"
